position: Consuming
description: >-
  MarineTraffic is the leading maritime intelligence and AIS ship-tracking platform — now part of Kpler. The
  MarineTraffic AIS Data API exposes the same live + historical vessel positions, port calls, berth calls, vessel master
  data, voyage forecasts, predictive arrivals, port-congestion analytics, sea-lane routing, reverse geocoding, and fleet
  management endpoints that power the public marinetraffic.com map and the Kpler maritime data services. Data is sourced
  from 13,000+ terrestrial AIS receivers plus satellite AIS, served as REST/JSON (with CSV / XML / JSONO alternatives),
  authenticated via a per-key prepaid credit balance, and metered in credits per response row with per-service
  refresh-interval caching.
