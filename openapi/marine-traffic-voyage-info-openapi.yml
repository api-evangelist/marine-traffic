                - $ref: '#/components/schemas/200_vi01_extended'
            application/xml:
              schema:
                oneOf:
                - $ref: '#/components/schemas/200_vi01_default'
                - $ref: '#/components/schemas/200_vi01_extended'
              examples:
                Default:
