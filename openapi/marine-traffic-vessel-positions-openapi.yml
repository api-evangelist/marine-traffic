  '/exportvessels/{api_key}     ':
    get:
      tags:
      - AIS API
      summary: Vessel Positions
      description: "<strong>The latest version of this API endpoint, including significant improvements, is available <a href=\"\
        https://developers.kpler.com/spec/dfdcdd47-ed9d-4fe1-bcc1-1f736a0a0266\" target=\"_blank\" rel=\"noopener noreferrer\"\
        >here</a>.</br></br>Please contact your Customer Success Manager to request access to the new endpoint.</strong></br></br></br></br>\n\
        Track vessels of interest anywhere in the world.</br></br><b>Notes</b><ul>\n    <li>Information about <a href=\"https://support.marinetraffic.com/en/articles/9552860-what-kind-of-information-is-ais-transmitted\"\
        >AIS-transmitted data</a></li>\n    <li>**SPEED** speed over ground returned in (knots x10)</li>\n    <li>**SPEED**\
        \ and **COURSE** values for base stations are represented by zero (0)</li>\n    <li>**TIMESTAMP** UTC second when\
        \ the report was generated (0-59)</li>\n    <li>**HEADING** true heading in degrees (0-359) (values -1 or 511 indicate\
        \ lack of data)</li>\n    <li>**HEADING** for SAR Aircrafts contains the Altitude of the aircraft (“STATUS” = 97)</li>\n\
        \    <li>**DSRC** describes whether the transmitted AIS message was received by a terrestrial (TER), satellite (SAT)\
        \ or roaming (ROAM) AIS antenna. </li>\n    <li>The <b>timespan</b> parameter lets you specify how far back in time\
        \ the API should look for the latest available vessel positions. Default value is set to 5 minutes and can be adjusted\
        \ to a maximum of 1,440 minutes (24 hours).</li>\n    <li>More information about response parameters: <a href=\"https://support.marinetraffic.com/en/articles/9552867-what-is-the-significance-of-the-ais-navigational-status-values\"\
        >STATUS</a>, <a href=\"https://support.marinetraffic.com/en/articles/9552866-what-is-the-significance-of-the-ais-shiptype-number\"\
        >SHIPTYPE</a></li>\n    <li>The <b>frequency of allowed API calls</b> is specific to your API key and is detailed\
        \ in your contract as a number of successful calls per time period. For example “2 calls per minute”. </br>Regardless\
        \ of this agreed limit, each API key is technically restricted to a maximum of 100 total (including successful and\
        \ unsuccessful) requests per minute to ensure system stability.</li>\n</ul>"
      operationId: exportvessels______
      parameters:
      - $ref: '#/components/parameters/api_key'
      - $ref: '#/components/parameters/v_MTA030AD_1'
      - $ref: '#/components/parameters/timespan_MTA030AD'
      - $ref: '#/components/parameters/vessel_type'
      - $ref: '#/components/parameters/cursor'
      - $ref: '#/components/parameters/limit'
      - $ref: '#/components/parameters/protocol_mandatory'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/200_MTA030AD'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/429_too_many_requests'
