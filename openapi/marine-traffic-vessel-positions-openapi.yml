        Track Vessels of interest in a predefined area of interest.</br></br><b>Notes</b><ul>\n    <li>Information about <a\
        \ href=\"https://support.marinetraffic.com/en/articles/9552860-what-kind-of-information-is-ais-transmitted\">AIS-transmitted\
        \ data</a></li>\n    <li>**SPEED** speed over ground returned in (knots x10)</li>\n    <li>**SPEED** and **COURSE**\
        \ values for base stations are represented by zero (0)</li>\n    <li>**TIMESTAMP** UTC second when the report was\
        \ generated (0-59)</li>\n    <li>**HEADING** true heading in degrees (0-359) (values -1 or 511 indicate lack of data)</li>\n\
