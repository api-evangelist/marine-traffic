  '/exportvessels/{api_key}    ':
    get:
      tags:
      - Vessel Positions (Legacy API)
      summary: Vessel Positions in a Dynamic Bounding Box
      description: "Retrieve positions for vessels sailing in an area that you define each time you call the service. </br></br>\
        \ <b>Notes</b> <ul>\n    <li>Information about <a href=\"https://support.marinetraffic.com/en/articles/9552860-what-kind-of-information-is-ais-transmitted\"\
