          description: Successful Response
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/200_ps04_default'
                - $ref: '#/components/schemas/200_ps04_extended'
                - $ref: '#/components/schemas/200_ps04_full'
            application/xml:
              schema:
                oneOf:
                - $ref: '#/components/schemas/200_ps04_default'
                - $ref: '#/components/schemas/200_ps04_extended'
                - $ref: '#/components/schemas/200_ps04_full'
              examples:
                Default:
                  summary: Simple
                  value: "<?xml version=\"1.0\" encoding=\"utf-8\" standalone=\"no\"?>\n<POS>\n    <row MMSI=\"244830406\" IMO=\"0\" SHIP_ID=\"253535\" LAT=\"52.371040\" LON=\"4.888482\" SPEED=\"0\" HEADING=\"511\" COURSE=\"0\" STATUS=\"5\" TIMESTAMP=\"2020-10-13T07:49:59\" DSRC=\"TER\" UTC_SECONDS=\"59\"/>\n    <row MMSI=\"244780352\" IMO=\"0\" SHIP_ID=\"250936\" LAT=\"52.377110\" LON=\"4.900798\" SPEED=\"2\" HEADING=\"511\" COURSE=\"16\" STATUS=\"7\" TIMESTAMP=\"2020-10-13T07:49:59\" DSRC=\"TER\" UTC_SECONDS=\"59\"/>\n    <row MMSI=\"244184646\" IMO=\"0\" SHIP_ID=\"5791081\" LAT=\"52.386230\" LON=\"4.891230\" SPEED=\"0\" HEADING=\"511\" COURSE=\"0\" STATUS=\"5\" TIMESTAMP=\"2020-10-13T07:49:26\" DSRC=\"TER\" UTC_SECONDS=\"26\"/>\n    <row MMSI=\"244260499\" IMO=\"0\" SHIP_ID=\"227195\" LAT=\"52.375680\" LON=\"4.897190\" SPEED=\"0\" HEADING=\"511\" COURSE=\"0\" STATUS=\"15\" TIMESTAMP=\"2020-10-13T07:49:59\" DSRC=\"TER\" UTC_SECONDS=\"59\"/>\n    <row MMSI=\"244013483\" IMO=\"0\" SHIP_ID=\"5868662\" LAT=\"52.367170\" LON=\"4.895307\" SPEED=\"0\" HEADING=\"511\" COURSE=\"0\" STATUS=\"0\" TIMESTAMP=\"2020-10-13T07:49:55\" DSRC=\"TER\" UTC_SECONDS=\"55\"/>\n</POS>"
                Extended:
                  summary: Extended
                  value: "<?xml version=\"1.0\" encoding=\"utf-8\" standalone=\"no\"?>\n<POS>\n    <row MMSI=\"244750688\" IMO=\"0\" SHIP_ID=\"1496\" LAT=\"52.392240\" LON=\"4.886143\" SPEED=\"0\" HEADING=\"511\" COURSE=\"244\" STATUS=\"0\" TIMESTAMP=\"2020-10-15T12:12:20\" DSRC=\"TER\" UTC_SECONDS=\"21\" SHIPNAME=\"IJVEER 52\" SHIPTYPE=\"60\" CALLSIGN=\"PH2792\" FLAG=\"NL\" LENGTH=\"28.6\" WIDTH=\"9\" GRT=\"\" DWT=\"\" DRAUGHT=\"24\" YEAR_BUILT=\"\" ROT=\"0\" TYPE_NAME=\"Inland, Ferry\" AIS_TYPE_SUMMARY=\"Passenger\" DESTINATION=\"\" ETA=\"\"/>\n    <row MMSI=\"244750690\" IMO=\"0\" SHIP_ID=\"1498\" LAT=\"52.400910\" LON=\"4.891057\" SPEED=\"0\" HEADING=\"511\" COURSE=\"7\" STATUS=\"0\" TIMESTAMP=\"2020-10-15T12:12:31\" DSRC=\"TER\" UTC_SECONDS=\"22\" SHIPNAME=\"IJVEER 56\" SHIPTYPE=\"60\" CALLSIGN=\"PB7406\" FLAG=\"NL\" LENGTH=\"28.6\" WIDTH=\"9\" GRT=\"\" DWT=\"\" DRAUGHT=\"24\" YEAR_BUILT=\"\" ROT=\"0\" TYPE_NAME=\"Inland, Ferry\" AIS_TYPE_SUMMARY=\"Passenger\" DESTINATION=\"\" ETA=\"\"/>\n    <row MMSI=\"244750692\" IMO=\"0\" SHIP_ID=\"1500\" LAT=\"52.380720\" LON=\"4.905505\" SPEED=\"69\" HEADING=\"511\" COURSE=\"273\" STATUS=\"0\" TIMESTAMP=\"2020-10-15T12:13:31\" DSRC=\"TER\" UTC_SECONDS=\"31\" SHIPNAME=\"IJVEER 55\" SHIPTYPE=\"60\" CALLSIGN=\"PB7405\" FLAG=\"NL\" LENGTH=\"28.6\" WIDTH=\"9\" GRT=\"\" DWT=\"\" DRAUGHT=\"24\" YEAR_BUILT=\"\" ROT=\"0\" TYPE_NAME=\"Inland, Ferry\" AIS_TYPE_SUMMARY=\"Passenger\" DESTINATION=\"HEEN EN TERUG\" ETA=\"\"/>\n    <row MMSI=\"229080000\" IMO=\"9583794\" SHIP_ID=\"1706\" LAT=\"52.395670\" LON=\"4.127333\" SPEED=\"34\" HEADING=\"141\" COURSE=\"135\" STATUS=\"3\" TIMESTAMP=\"2020-10-15T12:13:18\" DSRC=\"TER\" UTC_SECONDS=\"17\" SHIPNAME=\"BOLD TERN\" SHIPTYPE=\"80\" CALLSIGN=\"9HA3053\" FLAG=\"MT\" LENGTH=\"131.73\" WIDTH=\"39\" GRT=\"15328\" DWT=\"9033\" DRAUGHT=\"66\" YEAR_BUILT=\"2013\" ROT=\"0\" TYPE_NAME=\"Offshore Construction Jack Up\" AIS_TYPE_SUMMARY=\"Special Craft\" DESTINATION=\"LUCHTERDUINEN OWF\" ETA=\"2020-10-15T10:30:00\"/>\n    <row MMSI=\"355407000\" IMO=\"9165695\" SHIP_ID=\"2805\" LAT=\"37.877570\" LON=\"23.551210\" SPEED=\"1\" HEADING=\"164\" COURSE=\"289\" STATUS=\"1\" TIMESTAMP=\"2020-10-15T12:13:25\" DSRC=\"TER\" UTC_SECONDS=\"24\" SHIPNAME=\"SEXTA\" SHIPTYPE=\"70\" CALLSIGN=\"HOOK\" FLAG=\"PA\" LENGTH=\"144.75\" WIDTH=\"24\" GRT=\"11376\" DWT=\"18367\" DRAUGHT=\"50\" YEAR_BUILT=\"2000\" ROT=\"0\" TYPE_NAME=\"Bulk Carrier\" AIS_TYPE_SUMMARY=\"Cargo\" DESTINATION=\"PIRAEUS\" ETA=\"2020-08-19T20:00:00\"/>\n</POS>"
