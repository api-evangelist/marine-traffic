  /exportvessel/{api_key}:
    get:
      tags:
      - Vessel Positions (Legacy API)
      summary: Single Vessel Positions
      description: "Get the latest available position and voyage information for a particular vessel. </br></br> <b>Notes</b> <ul>\n    <li>Information about <a href=\"https://support.marinetraffic.com/en/articles/9552860-what-kind-of-information-is-ais-transmitted\">AIS-transmitted data</a></li>\n    <li>**SPEED** returned in (knots x10) and TIMESTAMP in UTC</li>\n    <li>**HEADING** for SAR Aircrafts contains the Altitude of the aircraft (“STATUS” = 97)</li>\n    <li>**HEADING** values -1 or 511 indicate lack of data</li>\n    <li>**SPEED** and **COURSE** values for base stations are represented by zero (0)</li>\n    <li>More information about response parameters: <a href=\"https://support.marinetraffic.com/en/articles/9552867-what-is-the-significance-of-the-ais-navigational-status-values\">STATUS</a>, <a href=\"https://support.marinetraffic.com/en/articles/9552866-what-is-the-significance-of-the-ais-shiptype-number\">SHIPTYPE</a></li>\n    <li>The <b>frequency of allowed API calls</b> is specific to your API key and is detailed in your contract as a number of successful calls per time period. For example “2 calls per minute”. </br>Regardless of this agreed limit, each API key is technically restricted to a maximum of 100 total (including successful and unsuccessful) requests per minute to ensure system stability.</li>\n</ul>"
      operationId: exportvessel
      parameters:
      - $ref: '#/components/parameters/api_key'
      - $ref: '#/components/parameters/v_PS07'
      - $ref: '#/components/parameters/shipid_PS07'
      - $ref: '#/components/parameters/imo_PS07'
      - $ref: '#/components/parameters/mmsi_PS07'
      - $ref: '#/components/parameters/timespan_PS07'
      - $ref: '#/components/parameters/msgtype_PS07'
      - $ref: '#/components/parameters/protocol'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/200_ps07_default'
                - $ref: '#/components/schemas/200_ps07_extended'
            application/xml:
              schema:
                oneOf:
                - $ref: '#/components/schemas/200_ps07_default'
                - $ref: '#/components/schemas/200_ps07_extended'
              examples:
                Default:
                  summary: Simple
                  value: "<?xml version=\"1.0\" encoding=\"utf-8\" standalone=\"no\"?>\n<POS>\n    <row MMSI=\"310627000\" LAT=\"50.510560\" LON=\"-3.452753\" SPEED=\"0\" HEADING=\"347\" COURSE=\"321\" STATUS=\"1\" TIMESTAMP=\"2020-10-13T12:21:16\" DSRC=\"TER\"/>\n</POS>"
                Extended:
                  summary: Extended
                  value: "<?xml version=\"1.0\" encoding=\"utf-8\" standalone=\"no\"?>\n<POS>\n    <row MMSI=\"310627000\" LAT=\"50.506480\" LON=\"-3.453697\" SPEED=\"42\" HEADING=\"279\" COURSE=\"268\" STATUS=\"0\" TIMESTAMP=\"2020-10-15T12:48:07\" SHIPNAME=\"QUEEN MARY 2\" SHIPTYPE=\"60\" IMO=\"9241061\" CALLSIGN=\"ZCEF6\" FLAG=\"BM\" PORT_ID=\"\" PORT_UNLOCODE=\"\" CURRENT_PORT=\"\" LAST_PORT_ID=\"106\" LAST_PORT_UNLOCODE=\"GBSOU\" LAST_PORT=\"SOUTHAMPTON\" LAST_PORT_TIME=\"2020-10-14T17:00:00\" DESTINATION=\"TORQUAY\" ETA=\"2020-10-14T13:00:00\" LENGTH=\"345.03\" WIDTH=\"48.7\" DRAUGHT=\"101\" GRT=\"149215\" DWT=\"19189\" YEAR_BUILT=\"2003\"/>\n</POS>"
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/400_ps07__missing_ship_identifier'
            application/xml:
              schema:
                $ref: '#/components/schemas/400_ps07__missing_ship_identifier'
              examples:
                ' Missing ship identifier':
                  summary: ' Missing ship identifier'
                  value: "<?xml version=\"1.0\" encoding=\"utf-8\" standalone=\"no\"?>\n<RESPONSE>\n    <STATUS>\n        <ERROR CODE=\"2\" DESCRIPTION=\"VESSEL MMSI OR IMO OR SHIPID MISSING\"/>\n    </STATUS>\n</RESPONSE>"
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/429_too_many_requests'
            application/xml:
              schema:
                $ref: '#/components/schemas/429_too_many_requests'
              examples:
                Area out of bound:
                  summary: Too Many Requests
                  value: "<?xml version=\"1.0\" encoding=\"utf-8\" standalone=\"no\"?>\n<RESPONSE>\n    <STATUS>\n        <ERROR CODE=\"1r\" DESCRIPTION=\"TOO MANY REQUESTS\"/>\n    </STATUS>\n</RESPONSE>"
