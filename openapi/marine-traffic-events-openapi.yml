                    \ <ERROR CODE=\"2a8\" DESCRIPTION=\"VESSEL MMSI OR IMO OR SHIPID OR PORTID OR UNLOCODE OR BERTHID OR TERMINALID\
                    \ MISSING\"/>\n    </STATUS>\n</RESPONSE>"
